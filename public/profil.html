<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Saya - MyTrack</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    :root {
      --head-foot: #2E5A8A; /* Sama kayak head menu */
      --gold-border: #DAA520;
      --text-hitam: #003366;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    html, body { height: 100%; }
    body { 
      display: flex; flex-direction: column; 
      background: linear-gradient(to bottom, #A0D8F1, #ffffff); /* Gradien biru muda ke putih */
      color: var(--text-hitam);
    }

    /* HEAD SAMA KAYAK MENU */
   .head {
      height: 60px; background: var(--head-foot);
      border-bottom: 2px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center;
      color: #fff; flex-shrink: 0; 
    }
   .head.logo { font-weight: bold; font-size: 22px; }

    /* ISI FORM */
   .content { 
      flex: 1; padding: 20px; 
      overflow-y: auto;
    }
   .form-group { margin-bottom: 15px; }
   .form-group label { 
      display: block; 
      font-weight: 700; 
      font-size: 14px; 
      margin-bottom: 5px; 
      color: #000; /* Huruf hitam */
    }
   .form-group input {
      width: 100%; padding: 12px; border: 1px solid #ccc;
      border-radius: 8px; font-size: 15px; background: #fff;
    }
   .form-group input[readonly] { background: #e9ecef; }

   .btn-simpan {
      width: 100%; margin-top: 10px; padding: 14px;
      background: var(--head-foot); color: #fff; border: none;
      border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;
    }

    /* FOOT SAMA KAYAK MENU */
   .foot {
      height: 50px; background: var(--head-foot);
      border-top: 2px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #fff; font-weight: 500; flex-shrink: 0; /* Huruf putih */
    }
  </style>
</head>
<body>

  <header class="head">
    <div class="logo">Profil</div> <!-- Huruf putih, kolom sama kayak menu -->
  </header>

  <main class="content">
    <form id="profilForm">
      <div class="form-group">
        <label>Nama : </label>
        <input type="text" id="nama" readonly> <!-- Auto dari Pi -->
      </div>
      <div class="form-group">
        <label>Tempat dan Tanggal lahir :</label>
        <input type="text" placeholder="Silahkan isi">
      </div>
      <div class="form-group">
        <label>Pekerjaan :</label>
        <input type="text" placeholder="Silahkan isi">
      </div>
      <div class="form-group">
        <label>Alamat :</label>
        <input type="text" placeholder="Silahkan ketik">
      </div>
      <div class="form-group">
        <label>No Telepon :</label>
        <input type="tel" placeholder="Silahkan isi">
      </div>
      <div class="form-group">
        <label>WA :</label>
        <input type="tel" placeholder="Silahkan isi">
      </div>
      <div class="form-group">
        <label>Gmail :</label>
        <input type="email" placeholder="Silahkan isi">
      </div>
      <button type="button" class="btn-simpan" onclick="alert('Data tersimpan lokal')">Simpan</button>
    </form>
  </main>

  <footer class="foot">
    <div>My Track App @2026</div> <!-- Huruf putih -->
  </footer>

  <script>
    // Auto isi Nama dari localStorage, sama kayak menu
    window.onload = function(){
      let u = localStorage.getItem('pi_user');
      if(u){ 
        let userLogin = JSON.parse(u); 
        document.getElementById('nama').value = '@' + userLogin.username;
      } else {
        document.getElementById('nama').value = '@guest';
      }
    };
  </script>
</body>
  </html>
