<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit-cover, user-scalable=no">
  <title>Galery NFT</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    :root{--biru:#0A1F44; --ungu:#4B0082; --emas:#DAA520; --hitam:#000;}
    body{margin:0;height:100%;background:var(--A0033);color:#fff;font-family:'Segoe UI';display:flex;flex-direction:column;}
    .header{padding:12px 15px;display:flex;align-items:center;background:var(--biru);border-bottom:3px solid var(--emas);}
    .back{font-size:1.2em;color:var(--emas);text-decoration:none;margin-right:10px;}
    .logo{font-size:1.5em;font-weight:900;color:var(--emas);text-align:center;flex-grow:1;}
    .main{flex-grow:1;overflow-y:auto;padding:15px;}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;}
    .card{background:var(--ungu);border:2px solid var(--emas);border-radius:12px;overflow:hidden;text-align:center;}
    .card img{width:100%;height:150px;object-fit:cover;background:#333;}
    .nama{font-weight:700;padding:10px 5px;font-size:0.9em;}
    .footer-mint{position:sticky;bottom:0;width:100%;padding:15px;background:var(--biru);border-top:3px solid var(--emas);text-align:center;}
    .btn-mint{width:100%;max-width:400px;background:var(--emas);color:var(--hitam);border:none;border-radius:12px;padding:12px;font-weight:700;}
    .btn-mint:disabled{background:#555;color:#aaa;cursor:not-allowed;}
    .status{font-size:0.8em;color:#aaa;margin-top:8px;}
  </style>
</head>
<body>
  <header class="header">
    <a href="menu.html" class="back">←</a>
    <div class="logo">Galery NFT</div>
    <div style="width:2em;"></div>
  </header>

  <main class="main">
    <div class="grid" id="nftGrid">
      <!-- NFT SAMPLE -->
      <div class="card"><img src="https://placehold.co/300x300/DAA520/000?text=GENESIS+1"><div class="nama">Genesis #001</div></div>
      <div class="card"><img src="https://placehold.co/300x300/DAA520/000?text=GENESIS+2"><div class="nama">Genesis #002</div></div>
      <div class="card"><img src="https://placehold.co/300x300/DAA520/000?text=GENESIS+3"><div class="nama">Genesis #003</div></div>
      <div class="card"><img src="https://placehold.co/300x300/DAA520/000?text=GENESIS+4"><div class="nama">Genesis #004</div></div>
    </div>
  </main>

  <footer class="footer-mint">
    <button class="btn-mint" id="mintBtn" disabled>Mint NFT Genesis - 0.01 Pi</button>
    <div class="status" id="status">Login Pi dulu untuk Mint</div>
  </footer>

<script>
  Pi.init({ version: "2.0", sandbox: true }); // GANTI TRUE DULU BUAT TEST

  const mintBtn = document.getElementById('mintBtn');
  const status = document.getElementById('status');
  let currentUser = null;

  // 1. AUTO LOGIN PAS BUKA HALAMAN
  window.onload = async () => {
    try {
      const authResult = await Pi.authenticate(['username', 'payments'], () => {});
      currentUser = authResult.user;
      status.textContent = `Login sebagai: @${currentUser.username}`;
      mintBtn.disabled = false; // Tombol aktif
    } catch (err) {
      status.textContent = 'Gagal Login Pi. Refresh halaman.';
      console.error(err);
    }
  };

  // 2. LOGIKA TOMBOL MINT AKTIF BAYAR
  mintBtn.onclick = async () => {
    if(!currentUser) return;
    mintBtn.disabled = true;
    status.textContent = 'Buka Pop-up Pi...';

    const paymentData = {
      amount: 0.01, // 0.01 Pi sesuai lu
      memo: `Mint NFT Genesis by @${currentUser.username}`,
      metadata: { app: "MyTrack", type: 'nft_mint', user: currentUser.username }
    };

    const callbacks = {
      onReadyForServerApproval: (paymentId) => {
        status.textContent = `Approved: ${paymentId}. Nunggu complete...`;
        // NANTI: fetch('/api/approve', {method:'POST', body:JSON.stringify({paymentId})
      },
      onReadyForServerCompletion: (paymentId, txid) => {
        status.textContent = `SUKSES! TXID: ${txid.slice(0,10)}...`;
        alert(`Mint Berhasil Bang 🔥\nTXID: ${txid}\nNFT lu masuk Galery V-44`);
        // V-44: SIMPEN TXID KE DB + GENERATE GAMBAR NFT
        mintBtn.disabled = false;
      },
      onCancel: () => {
        status.textContent = 'Batal bayar. Mint gagal.';
        mintBtn.disabled = false;
      },
      onError: (error) => {
        status.textContent = 'Error: ' + error;
        mintBtn.disabled = false;
      }
    };
    
    try {
      await Pi.createPayment(paymentData, callbacks);
    } catch (err) {
      status.textContent = 'Gagal: ' + err;
      mintBtn.disabled = false;
    }
  };
</script>
</body>
</html>
