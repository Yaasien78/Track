<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>3. Chat My Track</title>
<style>
:root{--biru:#0A1F44; --ungu:#4B0082; --emas:#DAA520; --hitam:#000;}
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{margin:0;height:100%;background:var(--biru);color:#fff;font-family:'Segoe UI',Arial,sans-serif; overflow:hidden;}
.wrap{display:flex;flex-direction:column;height:100%;}
.header{padding:8px 12px;background:var(--ungu);display:flex;align-items:center;gap:10px;flex-shrink:0}
.header a{font-size:1.5em;color:var(--emas);text-decoration:none;font-weight:700;line-height:1}
.header h1{font-size:1.1em;margin:0;flex-grow:1;text-align:center;color:var(--emas)}
.tabs{display:flex;background:var(--hitam);flex-shrink:0;border-bottom:2px solid var(--emas)}
.tab{flex:1;text-align:center;padding:10px;font-size:0.85em;font-weight:700;color:#aaa;cursor:pointer;border-bottom:3px solid transparent}
.tab.active{color:var(--emas);border-bottom:3px solid var(--emas);background:#1a1a1a}
#loginBox{padding:8px;background:#111;text-align:center;flex-shrink:0}
#loginBtn{background:var(--emas);color:var(--hitam);border:0;padding:8px 16px;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.9em}
#userInfo{display:none;gap:8px;align-items:center;justify-content:center;font-size:0.9em}
#userInfo img{width:28px;height:28px;border-radius:50%}
#userList{display:none;flex-direction:column;gap:8px;padding:12px;background:#111;overflow-y:auto;max-height:30%;border-bottom:1px solid #333}
.userRow{display:flex;gap:10px;align-items:center;background:var(--ungu);padding:8px;border-radius:8px;cursor:pointer}
.userRow img{width:32px;height:32px;border-radius:50%}
.userRow.active{border:2px solid var(--emas)}
#chatBox{flex-grow:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:var(--biru); min-height:0;}
.msg{background:var(--ungu);padding:6px 10px;border-radius:10px;max-width:85%;font-size:0.9em}
.msg.me{background:var(--emas);color:var(--hitam);align-self:flex-end}
.msg .user{font-size:0.75em;font-weight:700;color:var(--emas);margin-bottom:2px}
.msg.me .user{color:var(--hitam)}
.footer{flex-shrink:0;background:var(--hitam);border-top:2px solid var(--emas);}
.inputBox{display:flex;padding:8px;gap:8px;}
.inputBox input{flex-grow:1;padding:10px;border:0;border-radius:8px;background:#222;color:#fff;font-size:0.9em}
.inputBox button{padding:0 16px;border:0;border-radius:8px;background:var(--emas);color:var(--hitam);font-weight:700;cursor:pointer}
.inputBox button:disabled{opacity:0.5;}
.footLine{text-align:center;font-size:0.7em;color:var(--emas);padding-bottom:6px;}
.no-swipe{ touch-action: pan-y; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
<div class="wrap">

  <header class="header">
    <a href="menu.html"><</a>
    <h1 id="headerTitle">Chat Public</h1>
    <div style="width:1.5em"></div>
  </header>

  <div class="tabs">
    <div class="tab active" data-room="public">Public</div>
    <div class="tab" data-room="team">Team</div>
    <div class="tab" data-room="dm">DM</div>
  </div>

  <div id="loginBox">
    <button id="loginBtn">Login dengan Pi</button>
    <div id="userInfo">
      <img id="avatar" src="">
      <span id="username"></span>
    </div>
  </div>

  <div id="userList"></div>
  <div id="chatBox"></div>

  <footer class="footer no-swipe">
    <div class="inputBox">
      <input id="chatInput" type="text" placeholder="Login dulu buat chat..." disabled>
      <button id="sendBtn" disabled>Kirim</button>
    </div>
    <div class="footLine">My Track V-43 © 2026 | Swipe Kiri/Kanan</div>
  </footer>

</div>

<script>
const SUPA_URL = 'https://aecidmcsdtkshjdnrrrd.supabase.co'; 
const SUPA_KEY = 'sb_publishable_Ha3M2Q6FzUGaTVV4rtnong_lkHZrQWD';
const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

let currentUser = null;
let currentRoom = 'public';
let activeTeamId = null; 
let activePartner = null; 
let channel = null;

const chatBox = document.getElementById('chatBox');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const headerTitle = document.getElementById('headerTitle');
const userList = document.getElementById('userList');

// 1. GANTI TAB
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentRoom = tab.dataset.room;
    activeTeamId = null;
    activePartner = null;
    userList.style.display = currentRoom === 'dm' || currentRoom === 'team' ? 'flex' : 'none';
    headerTitle.textContent = 'Chat ' + tab.textContent;
    if(currentUser) loadChat();
  }
});

// 2. LOGIN PI
document.getElementById('loginBtn').onclick = async () => {
  try {
    if(typeof Pi === 'undefined'){ alert('WAJIB BUKA DI PI BROWSER'); return; }
    Pi.init({ version: "2.0", sandbox: true }); // TRUE = tes. FALSE = mainnet
    const auth = await Pi.authenticate(['username'], function(){});
    currentUser = { uid: auth.user.uid, username: auth.user.username, avatar: auth.user.profilePicture || '' };
    
    document.getElementById('loginBtn').style.display = 'none';
    document.getElementById('userInfo').style.display = 'flex';
    document.getElementById('username').textContent = '@' + currentUser.username;
    document.getElementById('avatar').src = currentUser.avatar;
    
    chatInput.disabled = false;
    chatInput.placeholder = `Ketik di #${currentRoom}...`;
    sendBtn.disabled = false;
    loadChat();
  } catch(e) { alert('Login Gagal: ' + e.message + '\nCek whitelist domain di Pi Dev'); }
}

// 3. KIRIM PESAN
sendBtn.onclick = sendMessage;
chatInput.addEventListener('keydown', e => { if(e.key === 'Enter') sendMessage(); });

async function sendMessage(){
  const text = chatInput.value.trim();
  if(!text || !currentUser) return;
  if((currentRoom === 'dm' || currentRoom === 'team') && !activeTeamId){ alert('Pilih user dulu'); return; }
  
  chatInput.value = '';
  await supabase.from('chat_messages').insert([{
    room: currentRoom,
    team_id: activeTeamId, 
    uid: currentUser.uid,
    username: currentUser.username,
    avatar_url: currentUser.avatar,
    text: text
  }]);
  // Update last_msg biar Team paling baru di atas
  await supabase.from('chat_teams').update({last_msg_at: new Date()}).eq('team_id', activeTeamId);
}

// 4. ROUTER CHAT
async function loadChat(){
  if(channel) supabase.removeChannel(channel);
  chatBox.innerHTML = '<div style="text-align:center;opacity:0.6">Loading...</div>';

  if(currentRoom === 'dm'){ return loadAllUsers(); } // List semua user buat DM baru
  if(currentRoom === 'team'){ return loadTeamList(); } // List Team lu doang

  const { data } = await supabase.from('chat_messages').select('*').eq('room', 'public').is('team_id', null).order('id', {ascending:true}).limit(50);
  renderChat(data);
  subscribe('public-null');
}

// 5. LOGIC DM 1V1 = AUTO MASUK TEAM
async function loadAllUsers(){
  const { data } = await supabase.from('chat_messages').select('uid,username,avatar_url').neq('uid', currentUser.uid).limit(30);
  const users = [...new Map(data.map(i => [i.uid, i])).values()];
  renderUserList(users, 'dm');
}

function renderUserList(users, type){
  userList.innerHTML = users.map(u => `
    <div class="userRow" data-uid="${u.uid}" data-name="${u.username}" data-avatar="${u.avatar_url}">
      <img src="${u.avatar_url}"><span>@${u.username}</span>
    </div>
  `).join('');

  document.querySelectorAll('.userRow').forEach(el => {
    el.onclick = async () => {
      document.querySelectorAll('.userRow').forEach(d => d.classList.remove('active'));
      el.classList.add('active');
      activePartner = {uid: el.dataset.uid, name: el.dataset.name, avatar: el.dataset.avatar};
      activeTeamId = [currentUser.uid, activePartner.uid].sort().join('_'); // KUNCI 1V1
      headerTitle.textContent = (type==='dm' ? 'DM @' : 'Team @') + activePartner.name;
      
      // KUNCI: AUTO MASUK TEAM PAS KLIK DM
      await supabase.from('chat_teams').upsert({
        team_id: activeTeamId,
        user1_uid: currentUser.uid,
        user2_uid: activePartner.uid,
        user1_name: currentUser.username,
        user2_name: activePartner.username
      }, {onConflict: 'team_id'});

      loadTeamChat(); // Langsung buka chat 1v1
    }
  });
}

// 6. LIST TEAM = LIST DM LU
async function loadTeamList(){
  const { data } = await supabase.from('chat_teams')
    .select('*').or(`user1_uid.eq.${currentUser.uid},user2_uid.eq.${currentUser.uid}`).order('last_msg_at', {ascending:false});
  
  const teams = data.map(t => {
    const partner = t.user1_uid === currentUser.uid ? {uid:t.user2_uid, name:t.user2_name, avatar:''} : {uid:t.user1_uid, name:t.user1_name, avatar:''};
    return {uid: partner.uid, username: partner.name, avatar_url: partner.avatar};
  });
  renderUserList(teams, 'team');
}

async function loadTeamChat(){
  const { data } = await supabase.from('chat_messages').select('*').eq('team_id', activeTeamId).order('id', {ascending:true}).limit(50);
  renderChat(data);
  subscribe('team-'+activeTeamId);
}

function subscribe(id){
  if(channel) supabase.removeChannel(channel);
  channel = supabase.channel(id)
    .on('postgres_changes', {event: 'INSERT', schema: 'public', table: 'chat_messages', filter: `team_id=eq.${activeTeamId}`}, payload => {
      renderMsg(payload.new);
      chatBox.scrollTop = chatBox.scrollHeight;
    })
    .subscribe();
}

function renderChat(data){
  chatBox.innerHTML = '';
  data.forEach(renderMsg);
  setTimeout(()=> chatBox.scrollTop = chatBox.scrollHeight, 100);
}

function renderMsg(msg){
  const div = document.createElement('div');
  div.className = 'msg ' + (msg.uid === currentUser?.uid ? 'me' : '');
  div.innerHTML = `<div class="user">@${msg.username}</div><div>${msg.text}</div>`;
  chatBox.appendChild(div);
}
</script>

<script src="menu.js"></script>
</body>
  </html>
