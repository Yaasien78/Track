<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(45deg,#0a0a2a 0%,#1a1a3a 40%,#4a1a4a 100%);color:white;min-height:100vh;overflow-x:hidden}
.browser-info{position:fixed;top:15px;right:15px;font-size:11px;color:white;opacity:0.7;text-align:right;z-index:100}
.browser-info a{color:white;text-decoration:underline}
.page{display:none;min-height:100vh}
.page.active{display:block}
.sidebar{position:fixed;left:0;top:0;width:70px;height:100vh;background:rgba(0,0,0,0.6);backdrop-filter:blur(15px);border-right:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;align-items:center;padding-top:80px;gap:25px;z-index:50}
.menu-item{font-size:10px;color:#aaa;text-align:center;cursor:pointer;transition:0.3s;padding:8px 5px}
.menu-item:hover{color:#ffd700;transform:scale(1.1)}
.menu-icon{font-size:24px;display:block;margin-bottom:5px}
.container-login{max-width:500px;margin:0 auto;padding:40px 20px;text-align:center}
h1{font-size:2.8rem;margin-bottom:10px;background:linear-gradient(90deg,#ffd700 0%,#c0c0c0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
.subtitle{font-size:15px;color:#ffd700;margin-bottom:30px;font-weight:600}
.login-box{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:20px;padding:40px 30px;margin-top:40px;border:1px solid rgba(255,255,255,0.2)}
.profile-4x6{width:151px;height:227px;border-radius:12px;border:3px solid #ffd700;margin:0 auto 15px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:50px;backdrop-filter:blur(10px);transition:0.3s;box-shadow:0 8px 25px rgba(0,0,0,0.3);overflow:hidden}
.profile-hint{font-size:12px;color:#ddd;margin-bottom:25px}
button{width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:0.3s;background:linear-gradient(90deg,#ffd700,#ffed4e);color:#1a1a2e;margin-top:10px}
button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.3)}
#status{margin-top:15px;font-size:13px;color:#ffd700}
.page-gallery{background:radial-gradient(ellipse at bottom,#1b2735 0%,#090a0f 100%);padding-left:80px;position:relative}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle 3s infinite}
@keyframes twinkle{0%,100%{opacity:0.3}50%{opacity:1;transform:scale(1.5)}}
.gallery-container{padding:40px 20px 100px;max-width:800px;margin:0 auto;position:relative;z-index:10}
.gallery-title{font-size:2rem;color:#ffd700;text-align:center;margin-bottom:20px;font-weight:800}
.search-box{width:100%;padding:14px 20px;border-radius:12px;border:1px solid rgba(255,215,0,0.3);background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);color:white;font-size:15px;margin-bottom:30px}
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding-bottom:80px}
.nft-card{background:rgba(255,255,255,0.08);border:1px solid rgba(255,215,0,0.3);border-radius:16px;padding:10px;backdrop-filter:blur(8px);box-shadow:0 8px 32px rgba(0,0,0,0.4);transform:perspective(1000px) translateZ(20px);transition:0.3s;cursor:pointer}
.nft-card:hover{transform:perspective(1000px) translateZ(40px) scale(1.03);border-color:#ffd700}
.nft-image{width:100%;
           <body>

</div>

<div id="page-chat" class="page page-gallery">
<div class="stars"></div>
<div class="sidebar">
<div class="menu-item" onclick="showPage('page-gallery')"><span class="menu-icon">🖼️</span>Galeri</div>
<div class="menu-item" onclick="showPage('page-public')"><span class="menu-icon">🌐</span>Publik</div>
<div class="menu-item" onclick="showPage('page-chat')"><span class="menu-icon">💬</span>Chat</div>
</div>
<div class="gallery-container">
<div class="gallery-title">CHAT</div>
<div style="display:flex;gap:10px;margin-bottom:15px">

<input id="dm-user" placeholder="Username" style="flex:1;padding:12px;border-radius:10px;border:none;background:rgba(0,0,0,0.5);color:white">

</div>

<div id="grup-messages" style="height:300px;overflow-y:auto;background:rgba(0,0,0,0.3);border-radius:12px;padding:15px;margin-bottom:15px"></div>

<input id="grup-msg" placeholder="Ketik di grup..." style="flex:4;padding:12px;border-radius:10px;border:none;background:rgba(0,0,0,0.5);color:white">

</div>
</div>

<script>

<script>
let currentUser = null;
let fotoBase64 = null;
let currentChatTab = 'dm';
let chatDM = {};
let grupMessages = [];

function detectBrowser() {
    const ua = navigator.userAgent;
    let browser = 'Unknown';
    if(ua.includes('PiBrowser')) browser = 'Pi Browser';
    else if(ua.includes('Chrome')) browser = 'Chrome';
    else if(ua.includes('Safari')) browser = 'Safari';
    document.getElementById('browser-name').textContent = browser;
}
detectBrowser();

function uploadFoto() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = evt => {
            fotoBase64 = evt.target.result;
            document.getElementById('profile-box').innerHTML = `<img src="${fotoBase64}" style="width:100%;height:100%;object-fit:cover">`;
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

async function loginPi() {
    document.getElementById('status').textContent = 'Membuka Pi Browser...';
    try {
        if(typeof Pi === 'undefined') {
            document.getElementById('status').textContent = 'Buka via Pi Browser untuk login beneran. Demo mode aktif.';
            currentUser = {username: 'demo_user', uid: 'demo123'};
            setTimeout(() => showPage('page-gallery'), 1000);
            return;
        }
        Pi.init({ version: "2.0", sandbox: true });
        const auth = await Pi.authenticate(['username'], function(payment) {
            console.log('Payment:', payment);
        });
        currentUser = auth.user;
        document.getElementById('status').textContent = 'Login sukses! Selamat datang ' + currentUser.username;
        setTimeout(() => showPage('page-gallery'), 1000);
    } catch(err) {
        document.getElementById('status').textContent = 'Login gagal: ' + err.message;
    }
}

function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    if(pageId === 'page-gallery') loadNFT();
    if(pageId === 'page-public') loadPublicFeed();
    if(pageId === 'page-chat') loadChat();
}

function createStars() {
    const starsContainer = document.getElementById('stars');
    if(!starsContainer) return;
    starsContainer.innerHTML = '';
    for(let i=0; i<100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = Math.random() * 3 + 1 + 'px';
        star.style.height = star.style.width;
        star.style.animationDelay = Math.random() * 3 + 's';
        starsContainer.appendChild(star);
    }
}

function loadNFT() {
    createStars();
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    const nfts = [
        {id:1, judul:'Genesis #001', pemilik:'@admin', harga:'10 Pi', emoji:'💎'},
        {id:2, judul:'Cosmic Cat', pemilik:'@alice', harga:'5 Pi', emoji:'🐱'},
        {id:3, judul:'Space Rock', pemilik:'@bob', harga:'3 Pi', emoji:'🪨'},
        {id:4, judul:'Star Dust', pemilik:'@charlie', harga:'8 Pi', emoji:'✨'}
    ];
    nfts.forEach(nft => {
        grid.innerHTML += `
        <div class="nft-card">
            <div class="nft-image">${nft.emoji}</div>
            <div class="nft-reg">REG-${nft.id}</div>
            <div class="nft-judul">${nft.judul}</div>
            <div class="nft-pemilik">Pemilik: ${nft.pemilik}</div>
            <div class="nft-harga">${nft.harga}</div>
        </div>`;
    });
}

function searchNFT() {
    const keyword = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('.nft-card').forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(keyword)? 'block' : 'none';
    });
}

function loadPublicFeed() {
    const feed = document.getElementById('publicFeed');
    feed.innerHTML = `
    <div class="nft-card" style="margin-bottom:15px">
        <div class="nft-image">🎨</div>
        <div class="nft-judul">NFT Langka Dijual!</div>
        <div class="nft-pemilik">@admin • 2 menit lalu</div>
        <div style="margin-top:10px;display:flex;gap:10px">
            <button onclick="likePost(this)" style="flex:1;margin:0;background:rgba(255,255,255,0.1);color:white">❤️ Like 0</button>
            <button onclick="alert('Buy ke Wallet')" style="flex:1;margin:0">Buy ke Wallet</button>
        </div>
    </div>`;
}

function likePost(btn) {
    let count = parseInt(btn.textContent.match(/\d+/)[0]) + 1;
    btn.textContent = `❤️ Like ${count}`;
    alert('Like +0.01 Pi ke pembuat!');
}

function showChatTab(tab) {
    currentChatTab = tab;
    document.getElementById('chat-dm').style.display = tab === 'dm'? 'block' : 'none';
    document.getElementById('chat-grup').style.display = tab === 'grup'? 'block' : 'none';
    document.getElementById('tab-dm').style.background = tab === 'dm'? 'linear-gradient(90deg,#ffd700,#ffed4e)' : 'rgba(255,255,255,0.1)';
    document.getElementById('tab-dm').style.color = tab === 'dm'? '#1a1a2e' : 'white';
    document.getElementById('tab-grup').style.background = tab === 'grup'? 'linear-gradient(90deg,#ffd700,#ffed4e)' : 'rgba(255,255,255,0.1)';
    document.getElementById('tab-grup').style.color = tab === 'grup'? '#1a1a2e' : 'white';
}

function loadChat() {
    const chatList = document.getElementById('chat-list');
    chatList.innerHTML = `
    <div onclick="openDM('alice')" style="padding:12px;background:rgba(255,255,255,0.05);border-radius:10px;margin-bottom:8px;cursor:pointer">Alice: Halo bang!</div>
    <div onclick="openDM('bob')" style="padding:12px;background:rgba(255,255,255,0.05);border-radius:10px;margin-bottom:8px;cursor:pointer">Bob: NFT nya keren</div>`;

    const grupMsg = document.getElementById('grup-messages');
    grupMsg.innerHTML = grupMessages.map(m => `<div style="margin-bottom:8px"><b>${m.user}:</b> ${m.text}</div>`).join('');
}

function openDM(user) {
    document.getElementById('dm-user').value = user;
}

function sendDM() {
    const user = document.getElementById('dm-user').value;
    const msg = document.getElementById('dm-msg').value;
    if(!user ||!msg) return alert('Isi username + pesan!');
    if(!chatDM[user]) chatDM[user] = [];
    chatDM[user].push({from: currentUser.username, text: msg});
    alert(`DM ke ${user}: ${msg}`);
    document.getElementById('dm-msg').value = '';
}

function sendGrup() {
    const msg = document.getElementById('grup-msg').value;
    if(!msg) return;
    grupMessages.push({user: currentUser.username, text: msg});
    loadChat();
    document.getElementById('grup-msg').value = '';
}
</script>
