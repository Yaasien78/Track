<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #ffffff; }
 .border-gold-2 { border: 2px solid #fbbf24; }
 .bg-dongker { background-color: #0f1a2e; }
 .bg-ungu { background-color: #6d28d9; }
 .bg-biru-logo { background-color: #2563eb; }
    header { height: 64px; z-index: 30; }
    footer { height: 64px; z-index: 30; }
    main { padding-top: 64px; padding-bottom: 64px; }
    .price-up { color: #4ade80 !important; transition: color 0.3s; }
    .price-down { color: #f87171 !important; transition: color 0.3s; }
    
    /* KUNCI: RAMPING + 3D HITAM + UKURAN SAMA */
    .text-kurus {
      font-family: 'Arial Narrow', Arial, sans-serif;
      font-weight: 800;
      text-shadow: 0 2px 3px #000; 
      letter-spacing: -1px; 
      line-height: 1.1; 
    }
  </style>
</head>
<body class="font-sans bg-white">
  <!-- HEAD FIXED -->
  <header class="bg-dongker px-3 border-b-2 border-yellow-400 flex items-center justify-between fixed top-0 w-full">
    <a href="menu.html" class="text-3xl text-yellow-400">≡</a>
    <h1 class="text-2xl font-extrabold text-white tracking-wide">My Track</h1>
    <img src="https://minepi.com/favicon.ico" alt="Pi" class="w-10 h-10 rounded-full border-2 border-yellow-400 ring-2 ring-yellow-300/50">
  </header>

  <!-- BOX UNGU: ROUNDED 2XL SESUAI SS -->
  <main class="px-3">
    <div class="bg-ungu border-gold-2 rounded-2xl p-3 m-0.5 h-[calc(100vh-128px-4px)] flex-col items-center justify-center text-center"> 
      
      <!-- HARGA KURUS RAPET UKURAN SAMA -->
      <div class="flex-col gap-0">
        <!-- 1. PI/USDT DI ATAS -->
        <p id="hargaUSDT" class="text-3xl text-white text-kurus">$0.0000</p>

        <!-- 2. PI/RUPIAH -->
        <p class="text-2xl text-blue-400 text-kurus">Pi/Rupiah</p>
        <p id="hargaIDR" class="text-2xl text-white text-kurus">Rp 0</p>

        <!-- 3. DOLLAR/RUPIAH -->
        <p class="text-2xl text-green-400 text-kurus">Dollar/Rupiah</p>
        <p id="kursUSDIDR" class="text-2xl text-white text-kurus">Rp 17,934.50</p>

        <p id="tanggal" class="text-2xl text-yellow-400 text-kurus my-1">Loading...</p>
      </div>

      <!-- LOGO TENGAH -->
      <div class="bg-biru-logo w-20 h-20 rounded-2xl border-2 border-yellow-400 flex items-center justify-center mx-auto my-1">
        <p class="text-white text-3xl font-extrabold text-kurus leading-none">My<br>Track</p>
      </div>

      <!-- WELCOME DITURUNIN LAGI: mt-6 -->
      <p class="text-sm font-extrabold text-white text-kurus leading-tight mt-6">Welcome to Pioneer<br>at My Track app @2026</p>

    </div>
  </main>

  <!-- FOOT FIXED -->
  <footer class="bg-dongker px-3 border-t-2 border-yellow-400 flex items-center justify-center fixed bottom-0 w-full">
    <button id="btnLogin" class="text-lg font-extrabold text-yellow-400 w-full text-kurus">Loading...</button>
  </footer>

  <script>
    let lastPiUSDT = 0; let lastPiIDR = 0; let lastKurs = 0;

    function updateTanggal() {
      document.getElementById('tanggal').innerText = 'Loading...';
    }
    updateTanggal(); 

    try {
      Pi.init({ version: "2.0", sandbox: true });
      Pi.authenticate({ scopes: ['username', 'payments'], onIncompletePaymentFound: () => {} })
 .then(auth => { document.getElementById('btnLogin').innerText = `Welcome ${auth.user.username}`; })
 .catch(() => { document.getElementById('btnLogin').innerText = 'Loading...'; });
    } catch(e) { document.getElementById('btnLogin').innerText = 'Loading...'; }

    function setColor(id, newVal, lastVal) {
      const el = document.getElementById(id);
      el.classList.remove('price-up', 'price-down');
      if(newVal > lastVal) el.classList.add('price-up');
      if(newVal < lastVal) el.classList.add('price-down');
    }

    async function updateData() {
      try {
        // AKTIFKAN LAGI: AMBIL PI + USD REALTIME
        const apiUrl = 'https://api.coingecko.com/api/v3/simple/price?ids=pi-network,usd&vs_currencies=usd,idr';
        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl);
        const res = await fetch(proxyUrl);
        const data = await res.json();
        
        const pi = data['pi-network'];
        const usd = data['usd'];

        if(pi) {
          const newUSDT = pi.usd; // PI/USDT = PI/USD
          const newIDR = pi.idr;
          setColor('hargaUSDT', newUSDT, lastPiUSDT);
          setColor('hargaIDR', newIDR, lastPiIDR);
          document.getElementById('hargaUSDT').innerText = `$${newUSDT.toFixed(4)}`;
          document.getElementById('hargaIDR').innerText = `Rp ${newIDR.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ".")}`;
          lastPiUSDT = newUSDT; lastPiIDR = newIDR;
        }
        if(usd) {
          const newKurs = usd.idr;
          setColor('kursUSDIDR', newKurs, lastKurs);
          document.getElementById('kursUSDIDR').innerText = `Rp ${newKurs.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ".")}`;
          lastKurs = newKurs;
        }
      } catch (e) { 
        console.log("API Gagal:", e);
        document.getElementById('hargaUSDT').innerText = '$0.0000'; // BALIK KE 0 KALAU GAGAL
      }
    }
    updateData(); 
    setInterval(updateData, 3000); // REALTIME 3 DETIK
  </script>
</body>
</html>
